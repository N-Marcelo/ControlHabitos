spring.application.name=ControlHabitos

spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=ControlHabitosDB;encrypt=false
spring.datasource.username=TU USUARIO
spring.datasource.password=TU CONTRASEŃA
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# Configuración de correo para Gmail
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=TU CORREO
spring.mail.password=TU CONTRASEŃA
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Habilita el modo debug para ver detalles en la consola
spring.mail.properties.mail.debug=true

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect


